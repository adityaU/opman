name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build frontend once (platform-independent) ───────────
  build-frontends:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install Rust toolchain (wasm only)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: leptos-ui/package-lock.json

      - name: Install Leptos UI npm deps
        run: npm ci
        working-directory: leptos-ui

      - name: Build Leptos UI
        run: trunk build --release
        working-directory: leptos-ui

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            leptos-ui/dist/
          retention-days: 1

  # ── Build backend for each target ──────────────────────────────
  build-backend:
    needs: build-frontends
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: leptos-ui/dist

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}

      - name: Install zigbuild (Linux cross-compilation)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Zig (Linux cross-compilation)
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build release binary
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../opman-${{ matrix.target }}.tar.gz opman
          cd ../../..
          shasum -a 256 opman-${{ matrix.target }}.tar.gz > opman-${{ matrix.target }}.tar.gz.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            opman-${{ matrix.target }}.tar.gz
            opman-${{ matrix.target }}.tar.gz.sha256
          retention-days: 1

  # ── Create release & update Homebrew ───────────────────────────
  publish:
    needs: build-backend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            opman-*.tar.gz
            opman-*.tar.gz.sha256

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          SHA=$(awk '{print $1}' opman-aarch64-apple-darwin.tar.gz.sha256)
          URL="https://github.com/adityaU/opman/releases/download/v${VERSION}/opman-aarch64-apple-darwin.tar.gz"

          git clone -b main "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/adityaU/homebrew-opman.git" tap
          cd tap

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/opman.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/opman.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/opman.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opman.rb
          git commit -m "opman ${VERSION}"
          git push origin main
