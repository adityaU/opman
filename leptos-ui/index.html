<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>opman</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Mermaid for diagram rendering in CodeEditorPanel -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <!-- DOMPurify for HTML/SVG sanitization in CodeEditorPanel -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <!-- Three.js for 3D model preview (STL, OBJ, GLTF, PLY, 3MF, FBX) -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { STLLoader } from 'three/addons/loaders/STLLoader.js';
      import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
      import { ThreeMFLoader } from 'three/addons/loaders/3MFLoader.js';
      import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
      import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';
      window.__THREE = THREE;
      window.__THREE_OrbitControls = OrbitControls;
      window.__THREE_Loaders = { STLLoader, OBJLoader, GLTFLoader, PLYLoader, ThreeMFLoader, FBXLoader, ColladaLoader };
    </script>
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <link data-trunk rel="css" href="styles/output.css" />
    <link data-trunk rel="css" href="styles/app-shell.css" />
    <link data-trunk rel="copy-file" href="public/favicon.svg" />
    <link data-trunk rel="copy-file" href="public/icon-192.png" />
    <link data-trunk rel="copy-file" href="public/icon-512.png" />
    <link data-trunk rel="copy-file" href="public/manifest.json" />
    <link data-trunk rel="copy-file" href="public/sw.js" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--color-bg, #0a0a0a);
            background-color: var(--color-bg, #0a0a0a);
            color-scheme: dark;
        }
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: var(--color-bg, #0a0a0a);
            background-color: var(--color-bg, #0a0a0a);
            color: var(--color-text, #e0e0e0);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            -webkit-tap-highlight-color: transparent;
        }
        #leptos-root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background: var(--color-bg, #0a0a0a);
            background-color: var(--color-bg, #0a0a0a);
        }
    </style>
    <!-- Appearance preload: apply saved appearance/theme-mode classes before paint -->
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('opman-theme-mode');
          if (mode === 'flat') document.documentElement.classList.add('flat-theme');
          var app = localStorage.getItem('opman-appearance') || 'dark';
          var effective = app;
          if (app === 'system') {
            effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (effective === 'light') {
            document.documentElement.classList.add('light-theme');
            document.documentElement.style.colorScheme = 'light';
          }
          document.documentElement.setAttribute('data-appearance', effective);
        } catch(e) {}
      })();
    </script>
</head>
<body>
    <div id="leptos-root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js", { scope: "/" }).then(
            function (reg) { if (reg) console.log("[SW] registered, scope:", reg.scope); },
            function (err) { console.error("[SW] registration failed:", err); }
          );
        });
      }
    </script>
</body>
</html>
