# Use mold for fast linking (native target only)
# mold is symlinked as 'ld' in /usr/local/libexec/mold/
[target.aarch64-unknown-linux-gnu]
linker = "gcc"
rustflags = ["-C", "link-arg=-B/usr/local/libexec/mold"]

[target.x86_64-unknown-linux-gnu]
linker = "gcc"
rustflags = ["-C", "link-arg=-B/usr/local/libexec/mold"]

# sccache wraps rustc for compilation caching
[build]
rustc-wrapper = "/usr/local/bin/sccache"
