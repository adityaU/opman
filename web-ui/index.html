<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0E14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0B0E14" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0E14" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>opman</title>
    <link rel="icon" type="image/svg+xml" href="/ui/favicon.svg" />
    <link rel="apple-touch-icon" href="/ui/icon-192.png" />
    <link rel="manifest" href="/ui/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { width: 100%; height: 100%; overflow: hidden; }
      body { width: 100%; height: 100%; overflow: hidden; margin: 0; }
      #root { width: 100%; height: 100%; overflow: hidden; position: relative; }
      html {
        background: var(--color-bg, #0B0E14);
        background-color: var(--color-bg, #0B0E14);
        color-scheme: dark;
      }
      body {
        background: var(--color-bg, #0B0E14);
        background-color: var(--color-bg, #0B0E14);
        color: var(--color-text, #eeeeee);
        font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        background: var(--color-bg, #0B0E14);
        background-color: var(--color-bg, #0B0E14);
      }
    </style>
  </head>
  <body>
    <!-- Liquid Glass SVG Filters (refraction via displacement map) -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <defs>
        <!-- Primary refraction filter — stronger distortion for prominent glass elements -->
        <filter id="liquid-glass-refraction" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence type="fractalNoise" baseFrequency="0.015 0.015"
            numOctaves="3" seed="2" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise"
            scale="5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <!-- Light refraction filter — subtle distortion for smaller elements -->
        <filter id="liquid-glass-refraction-light" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012"
            numOctaves="2" seed="5" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise"
            scale="3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/ui/sw.js", { scope: "/ui/" }).then(
            function (reg) { if (reg) console.log("[SW] registered, scope:", reg.scope); },
            function (err) { console.error("[SW] registration failed:", err); }
          );
        });
      }
    </script>
  </body>
</html>
